name: YaelFits
options:
  bundleIdPrefix: com.yaelfits
  deploymentTarget:
    iOS: "17.0"
  xcodeVersion: "15.0"
  generateEmptyDirectories: true

settings:
  base:
    SWIFT_VERSION: "5.9"
    MARKETING_VERSION: "1.0.0"
    CURRENT_PROJECT_VERSION: "1"
    DEVELOPMENT_TEAM: ""

packages:
  Lottie:
    url: https://github.com/airbnb/lottie-ios.git
    from: 4.4.0
  WebP:
    url: https://github.com/ainame/Swift-WebP.git
    from: 0.5.0

targets:
  YaelFits:
    type: application
    platform: iOS
    dependencies:
      - package: Lottie
      - package: WebP
    sources:
      - YaelFits
    resources:
      - path: YaelFits/Resources
        buildPhase: resources
    info:
      path: YaelFits/Info.plist
      properties:
        FALAPIKey: "$(FALAPIKey)"
        NSCameraUsageDescription: "Use the camera to capture a full-body mirror selfie for outfit generation."
        NSLocationWhenInUseUsageDescription: "Use your location to attach the current weather to uploaded outfits."
        UILaunchScreen: {}
        UIRequiresFullScreen: true
        UISupportedInterfaceOrientations:
          - UIInterfaceOrientationPortrait
    configFiles:
      Debug: Config/App.xcconfig
      Release: Config/App.xcconfig
    settings:
      base:
        INFOPLIST_FILE: YaelFits/Info.plist
        GENERATE_INFOPLIST_FILE: NO
        ASSETCATALOG_COMPILER_APPICON_NAME: AppIcon
        ASSETCATALOG_COMPILER_GLOBAL_ACCENT_COLOR_NAME: AccentColor
